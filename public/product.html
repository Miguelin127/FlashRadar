<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>FlashRadar Product</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      text-align: center;
      padding: 40px;
    }

    .card {
      background: white;
      padding: 30px;
      max-width: 500px;
      margin: auto;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    img {
      width: 100%;
      max-height: 350px;
      object-fit: contain;
    }

    select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    .price {
      font-size: 22px;
      font-weight: bold;
      margin: 15px 0;
    }

    button {
      background: #ff6a00;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

<div class="card">
  <img id="productImage" />
  <h2 id="productName"></h2>

  <select id="colorSelect"></select>
  <select id="sizeSelect"></select>

  <div class="price" id="price"></div>

  <button onclick="addToCart()">Add to Cart</button>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const productId = params.get("id");

  let variants = [];
  let selectedVariant = null;

  async function loadProduct() {
    try {
      const response = await fetch(
        `https://us-central1-flashradar-71c93.cloudfunctions.net/getPrintfulProducts?id=${productId}`
      );

      const raw = await response.json();
      const product = raw.result;

      if (!product) {
        document.getElementById("productName").innerText = "Product not found";
        return;
      }

      variants = product.sync_variants || [];

      document.getElementById("productName").innerText = product.name;
      document.getElementById("productImage").src = product.thumbnail_url;

      buildOptions();

    } catch (error) {
      console.error(error);
      document.getElementById("productName").innerText = "Error loading product";
    }
  }

  function buildOptions() {
    const colorSelect = document.getElementById("colorSelect");
    const sizeSelect = document.getElementById("sizeSelect");

    colorSelect.innerHTML = "";
    sizeSelect.innerHTML = "";

    const colors = [...new Set(variants.map(v => v.name.split(" / ")[0]))];
    const sizes = [...new Set(variants.map(v => v.name.split(" / ")[1]))];

    colors.forEach(color => {
      const opt = document.createElement("option");
      opt.value = color;
      opt.innerText = color;
      colorSelect.appendChild(opt);
    });

    sizes.forEach(size => {
      const opt = document.createElement("option");
      opt.value = size;
      opt.innerText = size;
      sizeSelect.appendChild(opt);
    });

    colorSelect.addEventListener("change", updateVariant);
    sizeSelect.addEventListener("change", updateVariant);

    updateVariant();
  }

  function updateVariant() {
    const color = document.getElementById("colorSelect").value;
    const size = document.getElementById("sizeSelect").value;

    selectedVariant = variants.find(v =>
      v.name.includes(color) && v.name.includes(size)
    );

    if (selectedVariant) {
      const price =
        selectedVariant.retail_price ||
        selectedVariant.price ||
        "0.00";

      document.getElementById("price").innerText =
        "$" + parseFloat(price).toFixed(2);
    }
  }

  function addToCart() {
    if (!selectedVariant) {
      alert("Select options first");
      return;
    }

    alert("Variant ID: " + selectedVariant.id + " ready for checkout.");
  }

  loadProduct();
</script>

</body>
</html>
