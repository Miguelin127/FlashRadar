<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>FlashRadar Shop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 40px;
      text-align: center;
    }

    h1 {
      color: #ff6a00;
      margin-bottom: 40px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      width: 260px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: contain;
      margin-bottom: 15px;
    }

    .card h3 {
      margin: 10px 0;
    }

    .buy-btn {
      background: #ff6a00;
      color: white;
      padding: 10px 20px;
      border-radius: 25px;
      text-decoration: none;
      display: inline-block;
      margin-top: 10px;
      cursor: pointer;
      border: none;
    }

    .loading {
      font-size: 18px;
      color: #777;
    }
  </style>
</head>

<body>

  <h1>⚡ FlashRadar Shop</h1>

  <div id="products" class="grid">
    <div class="loading">Loading products...</div>
  </div>

  <script>
    async function loadProducts() {
      try {
        const response = await fetch(
          "https://us-central1-flashradar-71c93.cloudfunctions.net/getPrintfulProducts"
        );

        const data = await response.json();
        const container = document.getElementById("products");

        container.innerHTML = "";

        if (!data.result || data.result.length === 0) {
          container.innerHTML = "<p>No products found.</p>";
          return;
        }

        data.result.forEach(product => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <img src="${product.thumbnail_url}" alt="${product.name}" />
            <h3>${product.name}</h3>
            <p>${product.variants} variants available</p>
            <button class="buy-btn" onclick="viewProduct(${product.id})">
              View
            </button>
          `;

          container.appendChild(card);
        });

      } catch (error) {
        console.error(error);
        document.getElementById("products").innerHTML =
          "<p>Failed to load products.</p>";
      }
    }

    function viewProduct(productId) {
      window.location.href = "/product.html?id=" + productId;
    }

    loadProducts();
  </script>

</body>
</html>
