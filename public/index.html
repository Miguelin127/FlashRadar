<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashRadar – Coming Soon</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff6a00, #ff9500);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      font-family: "Poppins", sans-serif;
      overflow: hidden;
    }

    /* 👇 FlashRadar logo animation */
    .logo {
      position: absolute;
      top: 40px;
      width: 180px; /* 50% larger than 120px */
      animation: moveLogo 5s ease-in-out infinite alternate;
    }

    @keyframes moveLogo {
      0% { transform: translateX(-30px); }
      100% { transform: translateX(30px); }
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-top: 140px;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 25px;
    }

    a {
      text-decoration: none;
      background: white;
      color: #ff6a00;
      padding: 12px 30px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      box-shadow: 0 3px 10px rgba(255, 255, 255, 0.2);
      transition: 0.3s;
    }

    a:hover {
      background: #fff5e6;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; margin-top: 120px; }
      .logo { width: 140px; }
    }
  </style>
</head>
<body>
  <img src="./logo.png" alt="FlashRadar Logo" class="logo" />
  <h1>⚡ FlashRadar</h1>
  <p>Fastest way to spot deals — launching soon.</p>
  <a href="https://hopp.bio/flashradar" target="_blank">Join the Beta</a>
</body>
</html>
